{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postni O'chirish</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body>
    <div class="container mt-5">
        <h2>Postni O'chirish</h2>

        <p>Ushbu postni o'chirishni tasdiqlaysizmi?</p>
        <h4>{{ object.title }}</h4>
        <p>{{ object.text }}</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Ha, o'chirish</button>
            <a href="{% url 'all_news' %}" class="btn btn-secondary">Bekor qilish</a>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
