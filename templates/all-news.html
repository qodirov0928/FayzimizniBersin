{% extends 'base.html' %}
{% block content%}
<main class="container mt-3 mb-5">
	{% for news in all_news %}
	<div class="card mb-4 shadow">
	  <div class="row no-gutters">
	    <div class="col-md-3">
	      <img src="/media/{{news.image}}" class="card-img" alt="{{news.title}}">
	    </div>
	    <div class="col-md-8">
	      <div class="card-body">
	        <h5 class="card-title">{{news.title}}</h5>
	        <p class="card-text">{{news.detail}}</p>
	        <p class="card-text"><a href="/detail/{{news.id}}" class="btn btn-sm btn-primary">Read Full</a></p>
			<p><h2><a href="{% url 'editpost' news.pk %}" class="btn btn-sm btn-primary">Edit</a></h2></p
			<p><h2><a href="{% url 'deletepost' news.pk %}" class="btn btn-sm btn-primary">Delete</a></h2></p>
	  
	      </div>
	    </div>
	  </div>
	</div>
{% endfor %}
</main>
{% endblock%}
